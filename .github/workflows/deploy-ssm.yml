name: Deploy via SSM

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          REPO_URL: ${{ secrets.REPO_URL }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          if [ -z "$INSTANCE_ID" ]; then
            echo "Missing EC2_INSTANCE_ID secret" >&2
            exit 1
          fi
          if [ -z "$REPO_URL" ]; then
            echo "Missing REPO_URL secret" >&2
            exit 1
          fi
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --comment "AWB deploy" \
            --parameters commands="[
              \"set -e\",
              \"sudo mkdir -p /srv\",
              \"if [ -d /srv/awb-academy/.git ]; then cd /srv/awb-academy && sudo git fetch --all && sudo git checkout $BRANCH && sudo git reset --hard origin/$BRANCH; else sudo git clone $REPO_URL /srv/awb-academy && cd /srv/awb-academy && sudo git checkout $BRANCH; fi\",
              \"cd /srv/awb-academy\",
              \"sudo ./infra/deploy/deploy.sh\"
            ]" \
            --output text
