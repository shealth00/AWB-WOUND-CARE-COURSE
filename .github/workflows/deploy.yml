name: QA and Deploy

on:
  workflow_dispatch: # This allows you to trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  # We keep QA here so you can see the errors, 
  # but we REMOVED the link that blocks the deployment.
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (Check for errors)
        run: npm run build --if-present

  deploy:
    runs-on: ubuntu-latest
    # This job now runs independently of QA
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 

      - name: Execute Deployment via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Forcing deploy to bypass QA lock" \
            --parameters 'commands=[
              "cd /Volumes/SERVER\ MEM3/AWB\ WOUND\ CARE\ COURSE",
              "sudo git fetch origin main",
              "sudo git reset --hard origin/main",
              "sudo npm install",
              "sudo npm run build --if-present",
              "sudo systemctl restart nginx",
              "sudo nginx -t"
            ]'
