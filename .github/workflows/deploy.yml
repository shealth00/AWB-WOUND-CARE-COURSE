name: QA and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (Check for errors)
        run: npm run build --if-present

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Execute Deployment via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          REPO_URL: ${{ secrets.REPO_URL }}
        run: |
          if [ -z "$INSTANCE_ID" ]; then
            echo "Missing EC2_INSTANCE_ID secret" >&2
            exit 1
          fi
          if [ -z "$REPO_URL" ]; then
            echo "Missing REPO_URL secret" >&2
            exit 1
          fi
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "AWB deploy via SSM" \
            --parameters commands="[
              \"set -e\",
              \"sudo mkdir -p /srv\",
              \"if [ -d /srv/awb-academy/.git ]; then cd /srv/awb-academy && sudo git fetch --all && sudo git checkout main && sudo git reset --hard origin/main; else sudo git clone $REPO_URL /srv/awb-academy && cd /srv/awb-academy && sudo git checkout main; fi\",
              \"cd /srv/awb-academy\",
              \"sudo ./infra/deploy/deploy.sh\"
            ]" \
            --output text
