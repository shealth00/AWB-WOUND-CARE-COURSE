name: Deploy Forms Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: us-east-1
      INSTANCE_ID: i-0ea90189e56dfae1b
      SITE_HOST: forms.sallyhealth.org
      REPO_ARCHIVE_URL: https://github.com/shealth00/sally-health-forms/archive/refs/heads/main.tar.gz

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy forms.sallyhealth.org from GitHub" \
            --parameters 'commands=[
              "set -e",
              "sudo apt-get update -y",
              "sudo apt-get install -y nginx curl tar rsync",
              "sudo mkdir -p /var/www/forms.sallyhealth.org",
              "TMP_DIR=$(mktemp -d)",
              "curl -L '"$REPO_ARCHIVE_URL"' | tar -xz -C $TMP_DIR --strip-components=1",
              "sudo rsync -av --delete $TMP_DIR/ /var/www/forms.sallyhealth.org/",
              "sudo chmod 755 /var/www/forms.sallyhealth.org",
              "sudo find /var/www/forms.sallyhealth.org -type d | sudo xargs chmod 755",
              "sudo find /var/www/forms.sallyhealth.org -type f | sudo xargs chmod 644",
              "printf '\''server {\\n  listen 80;\\n  server_name forms.sallyhealth.org;\\n  root /var/www/forms.sallyhealth.org;\\n  index index.html;\\n\\n  location / {\\n    try_files $uri $uri/ /index.html;\\n  }\\n}\\n'\'' | sudo tee /etc/nginx/sites-available/forms.sallyhealth.org >/dev/null",
              "sudo ln -sfn /etc/nginx/sites-available/forms.sallyhealth.org /etc/nginx/sites-enabled/forms.sallyhealth.org",
              "sudo rm -f /etc/nginx/sites-enabled/default",
              "sudo nginx -t",
              "sudo systemctl enable nginx",
              "sudo systemctl restart nginx"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          for attempt in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Success" ]; then
              break
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}'
              exit 1
            fi

            sleep 10
          done

          if [ "$STATUS" != "Success" ]; then
            echo "Timed out waiting for SSM command to finish."
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}'
